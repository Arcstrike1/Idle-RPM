services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idle_rpm_backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=idle_user
      - DB_PASSWORD=idle_pass
      - DB_NAME=idlerpm
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: idle_rpm_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cset155
      MYSQL_DATABASE: idlerpm
      MYSQL_USER: idle_user
      MYSQL_PASSWORD: idle_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Game/db/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
