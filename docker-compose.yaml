services:
  db:
    image: mysql:8.0
    container_name: idle-rpm-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-idlerpm}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - idle-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idle-rpm-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-idlerpm}
      DB_USER: ${DB_USER:-idle_rpm_main}
      DB_PASSWORD: ${DB_PASSWORD:-userpassword}
      SESSION_SECRET: ${SESSION_SECRET:-your-session-secret-change-in-production}
      PORT: ${PORT:-3000}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - idle-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  idle-network:
    driver: bridge
