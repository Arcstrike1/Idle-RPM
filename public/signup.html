<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Idle RPM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="Header">
        <h1>Create an Account</h1>
    </div>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Sign Up</h2>
            <form id="signupForm">
                <label for="su-username">Username</label>
                <input id="su-username" name="username" type="text" required>

                <label for="su-email">Email</label>
                <input id="su-email" name="email" type="email">

                <label for="su-password">Password</label>
                <input id="su-password" name="password" type="password" required>

                <label for="su-password2">Confirm Password</label>
                <input id="su-password2" name="password2" type="password" required>

                <button type="submit">Create Account</button>
            </form>
            <div id="signupMessage" class="auth-message"></div>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

   
</body>
</html>
